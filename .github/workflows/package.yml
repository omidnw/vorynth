name: Package

# Produces signed-ish desktop installers for Windows, macOS (Intel + Apple
# Silicon), Linux (x86_64 + ARM64), and FreeBSD from the bundled core-engine
# sidecar + Tauri shell.
#
# Pipeline per target (fail-fast at each stage):
#   1. Install pnpm + Node 22 + Rust toolchain.
#   2. Install workspace deps; rebuild better-sqlite3 for THIS platform.
#   3. Lint: typecheck → lint (fast feedback — stops here on failure)
#   4. Build: frontend → bundle sidecar
#   5. Release: stage sidecar → cargo tauri build → upload artifacts
#
# NOTE on "no Node install required" (project-details.md §15): in dev mode
# the Tauri shell falls back to `pnpm dev`. For the packaged app, the bundle
# still needs a Node runtime to execute the ESM launcher — that's why this
# workflow is split per-OS (we ship a Node-bundled executable per target).
# A pure Node-SEA that inlines Node itself is a follow-up once we add
# signing; for now the installers bundle Node via Tauri's resource mechanism.
#
# BSD Family note: Linux x86_64 binaries run on FreeBSD via the Linux ABI
# compatibility layer (linuxulator). Native FreeBSD builds are also provided
# using the FreeBSD VM runner for users who prefer native binaries.

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - ".agents/**"
      - "LICENSE"
  workflow_dispatch:

# Required for the tauri-action to create GitHub releases
permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ────────────────────────────────────────────────────────
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
            artifact: vorynth-macos-arm64
            use-cross: false
            is-harmonyos: false
          - os: macos-13
            target: x86_64-apple-darwin
            label: macOS (Intel)
            artifact: vorynth-macos-x64
            use-cross: false
            is-harmonyos: false

          # ── Linux ─────────────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x86_64
            artifact: vorynth-linux-x64
            use-cross: false
            is-harmonyos: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: Linux ARM64
            artifact: vorynth-linux-arm64
            use-cross: false
            is-harmonyos: false

          # ── Windows ──────────────────────────────────────────────────────
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            label: Windows
            artifact: vorynth-windows-x64
            use-cross: false
            is-harmonyos: false

          # ── HarmonyOS / OpenHarmony ──────────────────────────────────────
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-ohos
            label: HarmonyOS NEXT (ARM64)
            artifact: vorynth-harmonyos-arm64
            use-cross: false
            is-harmonyos: true

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        if: matrix.is-harmonyos == false
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # HarmonyOS needs a custom toolchain setup (OHOS NDK + Rust target).
      # The NDK provides the clang cross-compiler and OHOS sysroot needed
      # by Rust's aarch64-unknown-linux-ohos target.
      - name: Cache OHOS NDK
        id: cache-ohos
        if: matrix.is-harmonyos == true
        uses: actions/cache@v4
        with:
          path: ${{ runner.home }}/ohos-sdk
          key: ohos-sdk-6.0-Release

      - name: Setup Rust & NDK for HarmonyOS
        if: matrix.is-harmonyos == true
        run: |
          rustup target add aarch64-unknown-linux-ohos || \
            rustup target add aarch64-unknown-linux-gnu

          # Download & extract the OHOS SDK if cache missed.
          # The SDK is ~2.3 GiB; caching avoids re-download on subsequent runs.
          if [ ! -d "$HOME/ohos-sdk/linux/native/llvm/bin" ]; then
            echo "Downloading OpenHarmony SDK (~2.3 GiB, may take a while)..."
            mkdir -p "$HOME/ohos-sdk"
            sudo apt-get install -y -qq unzip
            curl -L -o /tmp/ohos-sdk.tar.gz \
              "https://repo.huaweicloud.com/openharmony/os/6.0-Release/ohos-sdk-windows_linux-public.tar.gz"
            tar -xzf /tmp/ohos-sdk.tar.gz -C "$HOME/ohos-sdk"
            rm /tmp/ohos-sdk.tar.gz

            # The tarball bundles per-platform zips. Extract the Linux native NDK.
            NATIVE_ZIP="$(ls "$HOME/ohos-sdk/linux"/native-linux-x64-*.zip 2>/dev/null | head -1)"
            if [ -n "$NATIVE_ZIP" ]; then
              unzip -q "$NATIVE_ZIP" -d "$HOME/ohos-sdk/linux/"
              rm "$NATIVE_ZIP"
            fi
          fi

          # Create clang wrapper — the Rust linker expects a compiler named
          # "aarch64-unknown-linux-ohos-clang" on PATH. The wrapper injects the
          # target triple, sysroot, and the -D__MUSL__ flag the OHOS C runtime
          # requires.
          mkdir -p "$HOME/.cargo/bin"
          cat > "$HOME/.cargo/bin/aarch64-unknown-linux-ohos-clang" << EOF
          #!/bin/sh
          exec $HOME/ohos-sdk/linux/native/llvm/bin/clang \
            -target aarch64-linux-ohos \
            --sysroot=$HOME/ohos-sdk/linux/native/sysroot \
            -D__MUSL__ \
            "\$@"
          EOF
          chmod +x "$HOME/.cargo/bin/aarch64-unknown-linux-ohos-clang"

          echo "OHOS_NDK_HOME=$HOME/ohos-sdk/linux/native" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/ohos-sdk/linux/native/llvm/bin" >> "$GITHUB_PATH"

      - name: Install Linux system deps
        if: startsWith(matrix.os, 'ubuntu') && matrix.is-harmonyos == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Rebuild native (better-sqlite3) for this platform
        if: matrix.is-harmonyos == false
        run: pnpm rebuild better-sqlite3

      # @vorynth/types needs its dist/ emitted before dependent packages
      # can resolve it via exports.
      - name: Build shared types
        run: pnpm --filter @vorynth/types build

      # ── Lint ────────────────────────────────────────────────────────────────
      # Stage 1: code quality. If this fails, nothing else runs.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # ── Build ───────────────────────────────────────────────────────────────
      # Stage 2: compile. If this fails, no release is produced.
      - name: Build frontend
        run: pnpm --filter @vorynth/desktop build

      - name: Bundle core engine sidecar
        run: pnpm --filter @vorynth/core-engine bundle

      # ── Release (Tauri desktop builds) ─────────────────────────────────────────
      # Stage 3a: produce native installers for standard desktop platforms.
      - name: Stage sidecar for Tauri
        if: matrix.is-harmonyos == false
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp -r apps/core-engine/dist-bundle \
            apps/desktop/src-tauri/binaries/vorynth-core-${{ matrix.target }}
          ls -la apps/desktop/src-tauri/binaries/

      - name: Build Tauri app
        if: matrix.is-harmonyos == false
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Vorynth ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version."
          releaseDraft: true
          prerelease: false
          overwrite: true
          args: --target ${{ matrix.target }}

      # ── Release (HarmonyOS build) ─────────────────────────────────────────────
      # Stage 3b: cross-compile the Rust shell as a shared library and package it
      # with the frontend assets into a raw bundle for DevEco Studio import.
      - name: Compile Rust library for HarmonyOS
        if: matrix.is-harmonyos == true
        env:
          CC: aarch64-unknown-linux-ohos-clang
          AR: llvm-ar
        run: |
          cd apps/desktop/src-tauri
          cargo build --release --target=aarch64-unknown-linux-ohos --lib

      - name: Assemble HarmonyOS app template
        if: matrix.is-harmonyos == true
        run: |
          mkdir -p harmonyos-output/entry/src/main/resources/rawfile
          mkdir -p harmonyos-output/entry/libs/arm64-v8a

          # 1. Inject compiled frontend assets
          cp -r apps/desktop/dist/* harmonyos-output/entry/src/main/resources/rawfile/

          # 2. Inject compiled Rust shared library
          cp apps/desktop/src-tauri/target/aarch64-unknown-linux-ohos/release/libvorynth_desktop.so \
            harmonyos-output/entry/libs/arm64-v8a/

          # 3. Compress to artifact archive
          tar -czf vorynth-harmonyos-raw-bundle.tar.gz harmonyos-output/

      # ── Upload ─────────────────────────────────────────────────────────────────
      - name: Upload desktop artifacts
        if: matrix.is-harmonyos == false
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.xz
          if-no-files-found: warn
          retention-days: 14

      - name: Upload HarmonyOS bundle
        if: matrix.is-harmonyos == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: vorynth-harmonyos-raw-bundle.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── FreeBSD (native) ─────────────────────────────────────────────────────
  # Built inside a FreeBSD VM on an Ubuntu runner. Tauri on FreeBSD uses the
  # native FreeBSD WebKit port. This is experimental — if the build fails, the
  # Linux x86_64 binary is the recommended fallback (works via Linux ABI).
  freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            # Switch to latest repo (quarterly doesn't have the needed
            # webkit2-gtk version in latest).
            # FreeBSD 15 renamed the official repo from "FreeBSD" to "FreeBSD-ports"
            # and pkg+http:// requires mirror_type: "srv".
            mkdir -p /usr/local/etc/pkg/repos
            echo 'FreeBSD-ports: {
              url: "pkg+http://pkg.FreeBSD.org/${ABI}/latest",
              mirror_type: "srv",
              enabled: yes
            }' > /usr/local/etc/pkg/repos/FreeBSD.conf
            pkg update -f
            pkg install -y node npm python3 rust pkgconf
            # List available webkit packages so we know what's available
            pkg search webkit2 || true
            # Install webkit — Tauri v2 needs webkit2gtk-4.1.
            # On FreeBSD this package is called webkit2-gtk_41.
            pkg install -y gtk3 librsvg2 libxcb
            pkg install -y webkit2-gtk_41

          run: |
            # pnpm is not available on FreeBSD pkg, use npm to install it
            npm install -g pnpm@10
            pnpm install --frozen-lockfile
            pnpm rebuild better-sqlite3

            # Build shared types first (needed by core-engine typecheck)
            pnpm --filter @vorynth/types build

            # Lint
            pnpm typecheck
            pnpm lint

            # Build
            pnpm --filter @vorynth/desktop build
            pnpm --filter @vorynth/core-engine bundle

            # Release
            mkdir -p apps/desktop/src-tauri/binaries
            cp -r apps/core-engine/dist-bundle \
              apps/desktop/src-tauri/binaries/vorynth-core-x86_64-unknown-freebsd

            # NOTE: tauri-cli can never be installed on FreeBSD — it depends
            # on cargo-mobile2, which hard-fails with compile_error! on
            # unsupported hosts (FreeBSD included) and is NOT behind a
            # feature flag. Build with plain cargo instead: the frontend is
            # embedded at compile time via tauri::generate_context!(), and
            # the sidecar ships as a plain directory next to the binary
            # (main.rs searches `binaries/` relative to the executable).
            cargo build --release --target x86_64-unknown-freebsd \
              --manifest-path apps/desktop/src-tauri/Cargo.toml

            # Package: binary + sidecar in one tarball.
            mkdir -p freebsd-output/binaries
            cp apps/desktop/src-tauri/target/x86_64-unknown-freebsd/release/vorynth-desktop \
              freebsd-output/
            cp -r apps/desktop/src-tauri/binaries/vorynth-core-x86_64-unknown-freebsd \
              freebsd-output/binaries/
            tar -czf vorynth-freebsd-x64.tar.gz -C freebsd-output .

      - name: Upload FreeBSD artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vorynth-freebsd-x64
          path: vorynth-freebsd-x64.tar.gz
          if-no-files-found: error
          retention-days: 14
